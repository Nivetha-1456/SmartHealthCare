{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <h2><i class="fas fa-user-edit"></i> Edit Profile</h2>
    <form method="POST">
        <div class="dashboard-grid" style="grid-template-columns: repeat(2,1fr); gap: 1.5rem;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}">
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" class="form-control" value="{{ user.age or '' }}">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" class="form-control">
                    <option value="Male" {% if user.gender=='Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if user.gender=='Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if user.gender=='Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Height (cm)</label>
                <input type="number" step="0.1" name="height" class="form-control" value="{{ user.height or '' }}">
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" step="0.1" name="weight" class="form-control" value="{{ user.weight or '' }}">
            </div>
            <div class="form-group">
                <label>BMI (calculated)</label>
                <input type="text" class="form-control" value="{{ " %.2f"|format(user.bmi or 0) }}" disabled>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Medical History</label>
                <textarea name="medical_history" class="form-control">{{ user.medical_history or '' }}</textarea>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Allergies</label>
                <textarea name="allergies" class="form-control">{{ user.allergies or '' }}</textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Save Profile</button>
    </form>
</div>
{% endblock %}
