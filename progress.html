{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <h2><i class="fas fa-camera"></i> Progress Photos</h2>
    <p>Upload photos to track your physical progress over time.</p>

    <form onsubmit="uploadPhoto(event)">
        <div class="form-group">
            <label>Choose Photo</label>
            <input type="file" id="photoUpload" accept="image/*" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> Upload</button>
    </form>

    <h3 style="margin-top:2rem;">Your Photos</h3>
    <div class="photo-grid" id="photoGrid"></div>
</div>
{% endblock %}
