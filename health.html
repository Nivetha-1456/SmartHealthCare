{% extends "base.html" %}
{% block content %}
<div class="dashboard-grid">
    <div class="glass-card">
        <h2><i class="fas fa-pen"></i> Log Health Data</h2>
        <form method="POST">
            <div class="form-group"><label>Temperature (°F)</label><input type="number" step="0.1" name="temperature"
                    class="form-control" required></div>
            <div class="form-group"><label>Heart Rate (BPM)</label><input type="number" name="heart_rate"
                    class="form-control" required></div>
            <div class="form-group"><label>Blood Pressure</label><input type="text" name="bp" class="form-control"
                    placeholder="120/80"></div>
            <div class="form-group"><label>SpO2 (%)</label><input type="number" name="spo2" class="form-control"
                    required></div>
            <div class="form-group"><label>Blood Sugar (mg/dL)</label><input type="number" step="0.1" name="blood_sugar"
                    class="form-control"></div>
            <div class="form-group"><label>Sleep Hours</label><input type="number" step="0.1" name="sleep_hours"
                    class="form-control"></div>
            <div class="form-group"><label>Steps</label><input type="number" name="steps" class="form-control"></div>
            <div class="form-group"><label>Stress Level (1-10)</label><input type="number" name="stress_level"
                    class="form-control" min="1" max="10"></div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Submit</button>
        </form>
    </div>
    <div class="glass-card">
        <h2><i class="fas fa-clock"></i> Health History</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Temp</th>
                        <th>HR</th>
                        <th>SpO2</th>
                        <th>AI</th>
                    </tr>
                </thead>
                <tbody>{% for r in records %}<tr>
                        <td>{{ r.date.split(' ')[0] }}</td>
                        <td>{{ r.temperature }}</td>
                        <td>{{ r.heart_rate }}</td>
                        <td>{{ r.spo2 }}</td>
                        <td>{{ r.ai_diagnosis }}</td>
                    </tr>{% endfor %}</tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
