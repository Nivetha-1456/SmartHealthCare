{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <h2><i class="fas fa-users"></i> Family Members</h2>
    <p>Add family members to monitor their health (demo data).</p>

    <form id="familyForm" onsubmit="addFamilyMember(event)">
        <div class="dashboard-grid" style="grid-template-columns: repeat(3,1fr); gap:1rem;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="familyName" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Relationship</label>
                <input type="text" id="familyRelation" class="form-control" placeholder="e.g., Spouse" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="familyAge" class="form-control" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-user-plus"></i> Add Member</button>
    </form>

    <h3 style="margin-top:2rem;">Your Family</h3>
    <div class="dashboard-grid" id="familyList"></div>
</div>
{% endblock %}
