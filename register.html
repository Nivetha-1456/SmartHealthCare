{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;"><i class="fas fa-user-plus"></i> Register</h2>
    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-key"></i> Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-user-tag"></i> Role</label>
            <select name="role" class="form-control" required>
                <option value="Patient">Patient</option>
                <option value="Doctor">Doctor</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-check-circle"></i> Sign
            Up</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>
{% endblock %}
