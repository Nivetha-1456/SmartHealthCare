{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 450px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;"><i class="fas fa-lock"></i> Login</h2>
    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-key"></i> Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" name="remember" id="remember" style="width: auto;">
            <label for="remember" style="margin: 0;">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Log
            In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>
{% endblock %}
